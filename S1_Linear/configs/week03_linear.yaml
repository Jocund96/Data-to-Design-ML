data:
  path: "data/processed/uci_concrete_clean_engineered.csv"
  target: "Strength"

features:
  original_yeh:
    - Cement
    - Slag
    - FlyAsh
    - Water
    - Superplasticizer
    - CoarseAggregate
    - FineAggregate
    - Age

split:
  test_size: 0.20
  random_state: 42
  cv_folds: 3

models:
  elastic_net:
    alpha: [0.001, 0.01, 0.1, 1.0, 10.0, 100.0]
    l1_ratio: [0.1, 0.3, 0.5, 0.7, 0.9]
  polynomial_ridge:
    degree: [1, 2, 3]
    alpha: [0.01, 0.1, 1.0, 10.0, 100.0]

outputs:
  tables_dir: "reports/tables"
  figures_dir: "reports/figures"
  metrics_dir: "results/metrics"
  predictions_dir: "results/predictions"
  models_dir: "results/models"
