data:
  input_path: "data/processed/shared_strategies/uhpc_semantic_50/uhpc_semantic_50_modeling.csv"
  target: "cs_28d"
  policy: "shared_semantic_recoding_50_percent"

split:
  train_size: 0.70
  validation_size: 0.15
  test_size: 0.15
  random_state: 42
  strategy: "feature_hash_grouped"

preprocessing:
  strategy: "shared_uhpc_semantic_50"
  numeric_imputer: "median"
  numeric_add_indicator: false
  numeric_scaler: "standard"
  one_hot_encoder: "OneHotEncoder(handle_unknown='ignore')"
  target_encoder: "TargetEncoder(cv=5)"
  target_encoded_scaler: "standard"

outputs:
  split_dir: "data/processed/week7/semantic_50_splits"
  transformed_dir: "data/processed/week7/semantic_50_transformed"
  preprocessor_path: "results/models/week7_semantic_50_preprocessor.joblib"
  tables_dir: "reports/tables"
  split_summary_name: "week07_semantic_50_split_summary.csv"
  preprocessing_summary_name: "week07_semantic_50_preprocessing_summary.csv"
  feature_names_name: "week07_semantic_50_transformed_feature_names.csv"
  categorical_report_name: "week07_semantic_50_categorical_cardinality.csv"
  missingness_report_name: "week07_semantic_50_train_missingness.csv"
  column_contract_name: "week07_shared_column_contract.csv"
